{% extends "base.html" %}

{% block title %}Change PIN{% endblock %}

{% block content %}
<div class="page-title-row">
  <h2 class="page-title">Change Personal PIN</h2>
  <a href="{{ url_for('auth.register') }}" class="secondary-button">Cancel</a>
</div>

<div style="max-width: 400px; background: #fff; padding: 2rem; border: 1px solid #ddd; border-radius: 4px; margin: 0 auto;">
  <p style="margin-top:0; color:#666; margin-bottom:1.5rem;">
    Update security PIN for <strong>{{ g.user['name'] }}</strong>.
  </p>

  <form method="post">
    
    <div style="margin-bottom: 1.5rem;">
      <label style="display:block; font-weight:600; margin-bottom:0.3rem;">Current PIN</label>
      <input type="password" name="current_pin" maxlength="3" required autofocus
             style="width:100%; padding:0.5rem; font-size:1.2rem; letter-spacing:0.2rem;">
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display:block; font-weight:600; margin-bottom:0.3rem;">New PIN</label>
      <input type="text" name="new_pin" maxlength="3" pattern="\d{3}" required 
             style="width:100%; padding:0.5rem; font-size:1.2rem; letter-spacing:0.2rem;">
      <div style="font-size:0.8rem; color:#666; margin-top:0.3rem;">Must be exactly 3 digits.</div>
    </div>

    <button type="submit" class="primary-button" style="width:100%;">Update PIN</button>
  </form>
</div>
{% endblock %}
